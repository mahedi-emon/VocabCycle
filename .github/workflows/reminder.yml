name: HourlyReminder

on:
  schedule:
    # Run hourly at minute 5 (avoids the :00 congestion when most cron jobs fire)
    - cron: '5 * * * *'
  workflow_dispatch: # Allow manual trigger for testing

# Cancel any in-progress runs of this workflow to avoid duplicates
concurrency:
  group: hourly-reminder
  cancel-in-progress: true

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Retry up to 3 times if GitHub runner has infrastructure issues
    strategy:
      max-parallel: 1
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary tzdata

      - name: Run Standalone Reminder Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRONTEND_URL: "https://vocabcycle.rawsyst.com"
          DEFAULT_FROM_EMAIL: "noreply@vocabcycle.rawsyst.com"
        run: python scripts/send_reminders.py
