name: DailyReminder

on:
  schedule:
    # Run hourly at the start of every hour (checks matching user reminder hours)
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Reminder Emails
        run: |
          curl -X POST \
            -H "X-Reminder-Token: ${{ secrets.REMINDER_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.vocabcycle.rawsyst.com/api/v1/reminders/send/
