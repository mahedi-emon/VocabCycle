name: HourlyReminder

on:
  schedule:
    # Run hourly at the start of every hour (checks matching user reminder hours)
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Run Standalone Reminder Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRONTEND_URL: "https://vocabcycle.rawsyst.com"
          DEFAULT_FROM_EMAIL: "noreply@vocabcycle.rawsyst.com"
        run: python scripts/send_reminders.py
